name: Generate Root README from Repo A values.yaml

on:
  workflow_dispatch:

jobs:
  generate-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout Repo B (Target Repo)
      - name: Checkout Repo B
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Checkout Repo A (Source Repo)
      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          repository: ItsAnurag27/repo-a   # 🔁 CHANGE THIS
          path: repo-a
          token: ${{ secrets.PAT_TOKEN }}

      # 3️⃣ Install helm-docs (fixed version to avoid CI mismatch)
      - name: Install helm-docs
        run: |
          set -euo pipefail
          curl -L https://github.com/norwoodj/helm-docs/releases/download/v1.11.0/helm-docs_1.11.0_Linux_x86_64.tar.gz \
          | tar -xz
          sudo mv helm-docs /usr/local/bin/
          helm-docs --version

      # 4️⃣ Generate README from Repo A values.yaml
      - name: Generate README.md
        run: |
          set -euo pipefail

          echo "Working directory: $(pwd)"
          echo "Files in repo root:"
          ls -la

          SOURCE_VALUES="repo-a/my-chart/values.yaml"  # 🔁 Adjust if inside subfolder

          if [[ ! -f "$SOURCE_VALUES" ]]; then
            echo "ERROR: Cannot find $SOURCE_VALUES"
            exit 1
          fi

          # Create temporary Helm chart structure
          TMP_ROOT="$(mktemp -d)"
          TMP_CHART="$TMP_ROOT/temp-chart"
          mkdir -p "$TMP_CHART"

          # Copy values.yaml from Repo A
          cp "$SOURCE_VALUES" "$TMP_CHART/values.yaml"

          # Create minimal Chart.yaml (required by helm-docs)
          cat <<EOF > "$TMP_CHART/Chart.yaml"
apiVersion: v2
name: temp-chart
description: Temporary chart for README generation
type: application
version: 0.1.0
appVersion: "0.1.0"
EOF

          # Run helm-docs
          helm-docs -c "$TMP_CHART"

          if [[ ! -f "$TMP_CHART/README.md" ]]; then
            echo "ERROR: helm-docs failed to generate README.md"
            exit 1
          fi

          # Replace root README.md
          cp "$TMP_CHART/README.md" "./README.md"

      # 5️⃣ Commit ONLY if README changed
      - name: Commit and push changes
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "docs: generate README from Repo A values.yaml"
          git push
