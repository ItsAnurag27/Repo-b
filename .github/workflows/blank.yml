name: Update Nexus README from Repo A Values

on:
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout Repo B (this repo) so we can commit changes here
      - name: Checkout Target (Repo B)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Checkout Repo A (source repo) into ./repo-a
      - name: Checkout Source (Repo A)
        uses: actions/checkout@v4
        with:
          repository: ItsAnurag27/repo-a
          path: repo-a
          token: ${{ secrets.PAT_TOKEN }}

      # 3️⃣ Install helm-docs
      - name: Install helm-docs
        shell: bash
        run: |
          set -euo pipefail
          curl -L https://github.com/norwoodj/helm-docs/releases/download/v1.11.0/helm-docs_1.11.0_Linux_x86_64.tar.gz | tar -xz
          sudo mv helm-docs /usr/local/bin/
          helm-docs --version

      # 4️⃣ Generate README from Repo A chart, then copy into Repo B
      - name: Generate README from Repo A chart
        shell: bash
        run: |
          set -euo pipefail

          CHART_PATH="repo-a/my-chart"

          echo "PWD: $(pwd)"
          echo "Repo A chart listing:"
          ls -la "$CHART_PATH"

          if [[ ! -f "$CHART_PATH/values.yaml" ]]; then
            echo "ERROR: missing $CHART_PATH/values.yaml"
            exit 1
          fi

          # (Optional) backup Repo A values.yaml
          cp -v "$CHART_PATH/values.yaml" "$CHART_PATH/values.yaml.bak"

          # Generate README.md inside Repo A chart folder
          helm-docs -c "$CHART_PATH"

          if [[ ! -f "$CHART_PATH/README.md" ]]; then
            echo "ERROR: helm-docs did not produce $CHART_PATH/README.md"
            exit 1
          fi

          # Copy generated README into Repo B (choose ONE destination)

          # Option A: overwrite Repo B root README.md
          # cp -v "$CHART_PATH/README.md" "README.md"

          # Option B: write into docs/
          mkdir -p docs
          cp -v "$CHART_PATH/README.md" "docs/my-chart-README.md"

      # 5️⃣ Commit + push if changed
      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "docs: update README from repo-a/my-chart values"
          git push
