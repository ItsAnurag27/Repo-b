name: Update Nexus README from Repo A Values

on:
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout Repo B (Target Repo)
      - name: Checkout Target (Repo B)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Checkout Repo A (Source Repo) into ./repo-a
      - name: Checkout Source (Repo A)
        uses: actions/checkout@v4
        with:
          repository: ItsAnurag27/repo-a
          path: repo-a
          token: ${{ secrets.PAT_TOKEN }}

      # 3️⃣ Install helm-docs
      - name: Install helm-docs
        shell: bash
        run: |
          set -euo pipefail
          curl -L https://github.com/norwoodj/helm-docs/releases/download/v1.11.0/helm-docs_1.11.0_Linux_x86_64.tar.gz \
            | tar -xz
          sudo mv helm-docs /usr/local/bin/
          helm-docs --version

      # 4️⃣ Generate README in Repo B chart using Repo A values.yaml
      - name: Generate README only
        shell: bash
        run: |
          set -euo pipefail

          TARGET_CHART_PATH="my-chart"        # chart in Repo B
          SOURCE_CHART_PATH="repo-a/my-chart" # chart in Repo A checkout

          if [[ ! -f "$TARGET_CHART_PATH/values.yaml" ]]; then
            echo "ERROR: missing target values.yaml at $TARGET_CHART_PATH/values.yaml"
            exit 1
          fi
          if [[ ! -f "$SOURCE_CHART_PATH/values.yaml" ]]; then
            echo "ERROR: missing source values.yaml at $SOURCE_CHART_PATH/values.yaml"
            exit 1
          fi

          # Backup + restore target values.yaml even if helm-docs fails
          cp -v "$TARGET_CHART_PATH/values.yaml" "$TARGET_CHART_PATH/values.yaml.bak"
          trap 'mv -f "$TARGET_CHART_PATH/values.yaml.bak" "$TARGET_CHART_PATH/values.yaml"' EXIT

          # Temporarily replace Repo B values.yaml with Repo A values.yaml
          cp -v "$SOURCE_CHART_PATH/values.yaml" "$TARGET_CHART_PATH/values.yaml"

          # Generate README for Repo B chart
          helm-docs -c "$TARGET_CHART_PATH"

      # 5️⃣ Commit + push changes (only if README actually changed)
      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git status --porcelain

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "docs: update chart README from Repo A values"
          git push
