name: Generate Root README from Repo A values.yaml

on:
  workflow_dispatch:

jobs:
  generate-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo B
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          repository: ItsAnurag27/repo-a   # CHANGE THIS
          path: repo-a
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install helm-docs
        run: |
          set -e
          curl -L https://github.com/norwoodj/helm-docs/releases/download/v1.11.0/helm-docs_1.11.0_Linux_x86_64.tar.gz | tar -xz
          sudo mv helm-docs /usr/local/bin/
          helm-docs --version

      - name: Generate README.md
        run: |
          set -e

          SOURCE_VALUES="repo-a/values.yaml"  # adjust if needed

          if [ ! -f "$SOURCE_VALUES" ]; then
            echo "ERROR: Cannot find $SOURCE_VALUES"
            exit 1
          fi

          TMP_ROOT=$(mktemp -d)
          TMP_CHART="$TMP_ROOT/temp-chart"
          mkdir -p "$TMP_CHART"

          cp "$SOURCE_VALUES" "$TMP_CHART/values.yaml"

          echo "apiVersion: v2" > "$TMP_CHART/Chart.yaml"
          echo "name: temp-chart" >> "$TMP_CHART/Chart.yaml"
          echo "description: Temporary chart for README generation" >> "$TMP_CHART/Chart.yaml"
          echo "type: application" >> "$TMP_CHART/Chart.yaml"
          echo "version: 0.1.0" >> "$TMP_CHART/Chart.yaml"
          echo "appVersion: 0.1.0" >> "$TMP_CHART/Chart.yaml"

          helm-docs -c "$TMP_CHART"

          cp "$TMP_CHART/README.md" "./README.md"

      - name: Commit and push changes
        run: |
          set -e

          if git diff --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "docs: generate README from Repo A values.yaml"
          git push
