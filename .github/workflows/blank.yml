name: Generate Root README from values.yaml

on:
  workflow_dispatch:

jobs:
  generate-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install helm-docs
        shell: bash
        run: |
          set -euo pipefail
          curl -L https://github.com/norwoodj/helm-docs/releases/download/v1.11.0/helm-docs_1.11.0_Linux_x86_64.tar.gz | tar -xz
          sudo mv helm-docs /usr/local/bin/
          helm-docs --version

      - name: Generate README.md at repo root
        shell: bash
        run: |
          set -euo pipefail
          echo "Full repository structure:"
          ls -R
          SOURCE_VALUES="./my-chart/values.yaml"

          echo "PWD: $(pwd)"
          echo "Repo root listing:"
          ls -la
          echo "Chart listing:"
          ls -la my-chart || true

          if [[ ! -f "$SOURCE_VALUES" ]]; then
            echo "ERROR: missing $SOURCE_VALUES"
            exit 1
          fi

          TMP_ROOT="$(mktemp -d)"
          TMP_CHART="$TMP_ROOT/my-chart"
          mkdir -p "$TMP_CHART"

          cp -v "$SOURCE_VALUES" "$TMP_CHART/values.yaml"

          # helm-docs expects a Helm chart structure; create minimal Chart.yaml in temp.
          printf '%s\n' \
            'apiVersion: v2' \
            'name: my-chart' \
            'description: Temporary chart for helm-docs generation (runner only)' \
            'type: application' \
            'version: 0.1.0' \
            'appVersion: "0.1.0"' \
            > "$TMP_CHART/Chart.yaml"

          helm-docs -c "$TMP_CHART"

          if [[ ! -f "$TMP_CHART/README.md" ]]; then
            echo "ERROR: helm-docs did not produce README.md"
            exit 1
          fi

          cp -v "$TMP_CHART/README.md" "README.md"

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "docs: generate README from my-chart values"
          git push
