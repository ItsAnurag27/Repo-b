name: Update Nexus README from Repo A Values

on:
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Checkout Repo B (this repo) so we can commit a README update here
      - name: Checkout Target (Repo B)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Checkout Repo A into ./repo-a
      - name: Checkout Source (Repo A)
        uses: actions/checkout@v4
        with:
          repository: ItsAnurag27/repo-a
          path: repo-a
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install helm-docs
        shell: bash
        run: |
          set -euo pipefail
          curl -L https://github.com/norwoodj/helm-docs/releases/download/v1.11.0/helm-docs_1.11.0_Linux_x86_64.tar.gz | tar -xz
          sudo mv helm-docs /usr/local/bin/
          helm-docs --version

      # Generate README using Repo A chart + Repo A values.yaml
      - name: Generate README from Repo A chart
        shell: bash
        run: |
          set -euo pipefail

          CHART_PATH="repo-a/my-chart"

          if [[ ! -f "$CHART_PATH/values.yaml" ]]; then
            echo "ERROR: missing $CHART_PATH/values.yaml"
            exit 1
          fi

          # Backup Repo A values.yaml (optional)
          cp -v "$CHART_PATH/values.yaml" "$CHART_PATH/values.yaml.bak"

          # Generate README.md inside repo-a/my-chart
          helm-docs -c "$CHART_PATH"

          # Copy the generated README into Repo B (choose destination)
          mkdir -p docs
          cp -v "$CHART_PATH/README.md" "docs/my-chart-README.md"

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "docs: update README from repo-a values"
          git push
